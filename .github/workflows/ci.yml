name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  target-runtime-tests:
    name: Target runtime tests
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Compose definitions
        run: |
          docker compose -f docker-compose.test.yml config --quiet
          docker compose -f docker-compose.real.yml config --quiet

      - name: Pull pinned Peatio runtime
        run: docker pull quay.io/openware/peatio:2.6.48

      - name: Run isolated RSpec suite
        run: docker compose -f docker-compose.test.yml run --build --rm rspec

      - name: Build deployable runtime image
        run: docker build --pull --file Dockerfile.real --tag perp-liquidation:${{ github.sha }} .

      - name: Check contract backward compatibility
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -w /app \
            perp-liquidation:${{ github.sha }} \
            ruby bin/check_contract_compatibility "${{ github.event.pull_request.base.sha }}"

      - name: Test deployable runtime image
        run: docker run --rm --network none perp-liquidation:${{ github.sha }} bundle exec rake spec

      - name: Audit locked Ruby dependencies
        run: |
          docker run --rm --user root perp-liquidation:${{ github.sha }} sh -lc \
            "gem install bundler-audit -v 0.9.2 --no-document --bindir /usr/local/bin && bundle-audit check --update --ignore CVE-2026-47736 CVE-2026-47737"

      - name: Prepare component test artifacts
        run: |
          mkdir -p tmp/component-smoke
          chmod 0777 tmp/component-smoke

      - name: Run component smoke matrix
        run: |
          docker compose -f docker-compose.real.yml --profile test up --build \
            --abort-on-container-exit --exit-code-from component-smoke component-smoke

      - name: Capture component logs
        if: always()
        run: |
          mkdir -p tmp/component-smoke
          docker compose -f docker-compose.real.yml --profile test logs --no-color > tmp/component-smoke/compose.log

      - name: Upload component test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: component-smoke-${{ github.sha }}
          path: tmp/component-smoke
          if-no-files-found: error

      - name: Clean component test environment
        if: always()
        run: docker compose -f docker-compose.real.yml --profile test down -v --remove-orphans

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
