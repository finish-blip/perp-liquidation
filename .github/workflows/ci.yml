name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  target-runtime-tests:
    name: Target runtime tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Compose definitions
        run: |
          docker compose -f docker-compose.test.yml config --quiet
          docker compose -f docker-compose.real.yml config --quiet

      - name: Pull pinned Peatio runtime
        run: docker pull quay.io/openware/peatio:2.6.48

      - name: Run isolated RSpec suite
        run: docker compose -f docker-compose.test.yml run --rm rspec

      - name: Build deployable runtime image
        run: docker build --pull --file Dockerfile.real --tag perp-liquidation:${{ github.sha }} .

      - name: Test deployable runtime image
        run: docker run --rm --network none perp-liquidation:${{ github.sha }} bundle exec rake spec

      - name: Audit locked Ruby dependencies
        run: |
          docker run --rm --user root perp-liquidation:${{ github.sha }} sh -lc \
            "gem install bundler-audit -v 0.9.2 --no-document --bindir /usr/local/bin && bundle-audit check --update --ignore CVE-2026-47736 CVE-2026-47737"

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
