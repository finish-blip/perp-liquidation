service:
  name: perp-liquidation
  mode: command-executor

liquidation:
  source: LIQUIDATION
  max_retry_count: 3
  retry_delay_seconds: 10
  terminal_statuses:
    - COMPLETED
    - REJECTED
    - CANCELLED
    - EXPIRED
    - SUPERSEDED
    - MANUAL_REVIEW

locks:
  risk_unit_ttl_seconds: 30
  renewal_interval_seconds: 10

websocket:
  private_channel: perp.liquidations

contracts:
  risk_command_topic: risk.liquidation.command
  order_event_topic: order.lifecycle
  settlement_event_topic: position.settlement.confirmed
  result_topic: liquidation.execution.result
